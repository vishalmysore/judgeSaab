<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <rect width="960" height="500" fill="#ffffff"/>
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#17233f">Token savings vs. judgment fidelity</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#5c6685">The best strategy is the one furthest right that stays at 100% fidelity.</text>

  <!-- plot area -->
  <!-- axes -->
  <line x1="90" y1="90" x2="90" y2="420" stroke="#c9d2e8" stroke-width="1.5"/>
  <line x1="90" y1="420" x2="900" y2="420" stroke="#c9d2e8" stroke-width="1.5"/>
  <text x="40" y="255" text-anchor="middle" font-size="13" fill="#5c6685" transform="rotate(-90 40 255)">Judgment fidelity (verdict unchanged)</text>
  <text x="495" y="470" text-anchor="middle" font-size="13" fill="#5c6685">Token savings vs. full context →</text>

  <!-- y ticks: 100% at y=110, 67% approx, 0 at 420. map fidelity f -> y = 420 - f*310 -->
  <!-- 100% line -->
  <line x1="90" y1="110" x2="900" y2="110" stroke="#10b981" stroke-dasharray="5 4" stroke-width="1.2"/>
  <text x="900" y="106" text-anchor="end" font-size="11" fill="#10b981">100% — verdict preserved (safe)</text>
  <text x="78" y="114" text-anchor="end" font-size="11" fill="#5c6685">100%</text>
  <text x="78" y="272" text-anchor="end" font-size="11" fill="#5c6685">67%</text>
  <line x1="86" y1="268" x2="90" y2="268" stroke="#c9d2e8"/>
  <text x="78" y="424" text-anchor="end" font-size="11" fill="#5c6685">0%</text>

  <!-- x ticks: savings s -> x = 90 + s*8.1 (0..100 -> 90..900) -->
  <text x="90" y="440" text-anchor="middle" font-size="11" fill="#5c6685">0%</text>
  <text x="292" y="440" text-anchor="middle" font-size="11" fill="#5c6685">25%</text>
  <text x="495" y="440" text-anchor="middle" font-size="11" fill="#5c6685">50%</text>
  <text x="697" y="440" text-anchor="middle" font-size="11" fill="#5c6685">75%</text>
  <text x="900" y="440" text-anchor="middle" font-size="11" fill="#5c6685">100%</text>

  <!-- points: fidelity 100 -> y=110 ; kgraph 67 -> y=268 -->
  <!-- raw 0,100 -->
  <circle cx="90" cy="110" r="7" fill="#6b7280"/>
  <text x="90" y="96" text-anchor="middle" font-size="11" fill="#374151">raw</text>
  <!-- chunking 20,100 -->
  <circle cx="252" cy="110" r="7" fill="#2f56c8"/>
  <text x="252" y="96" text-anchor="middle" font-size="11" fill="#2f56c8">chunking</text>
  <!-- headroom 23,100 -->
  <circle cx="276" cy="110" r="8" fill="#2f56c8" stroke="#17233f" stroke-width="1.5"/>
  <text x="300" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#2f56c8">Headroom</text>
  <!-- structured 50,100 -->
  <circle cx="495" cy="110" r="7" fill="#10b981"/>
  <text x="470" y="96" text-anchor="middle" font-size="11" fill="#0f9d76">structured</text>
  <!-- semantic 52,100 -->
  <circle cx="511" cy="110" r="8" fill="#10b981" stroke="#17233f" stroke-width="1.5"/>
  <text x="560" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#0f9d76">semantic ★</text>
  <!-- kgraph 88,67 -->
  <circle cx="803" cy="268" r="8" fill="#ef4444"/>
  <text x="803" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">knowledge-graph</text>
  <text x="803" y="308" text-anchor="middle" font-size="10" fill="#ef4444">flipped a verdict</text>

  <!-- annotation -->
  <rect x="540" y="150" width="330" height="70" rx="10" fill="#fff7f7" stroke="#f3c7c7"/>
  <text x="556" y="176" font-size="12" font-weight="700" fill="#ef4444">−88% tokens looks great…</text>
  <text x="556" y="196" font-size="11.5" fill="#7a2e2e">…until you notice the model changed its mind on</text>
  <text x="556" y="212" font-size="11.5" fill="#7a2e2e">1 in 3 cases. Cheap ≠ correct.</text>
</svg>
