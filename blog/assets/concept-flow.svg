<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <rect width="960" height="330" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#17233f">The judgment-fidelity test</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#5c6685">Compress the facts. Ask the judge again. Did the verdict survive?</text>

  <!-- Full facts -->
  <rect x="30" y="95" width="180" height="140" rx="12" fill="#f4f6fc" stroke="#e4e9f5"/>
  <text x="120" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#5c6685">FULL CASE FACTS</text>
  <text x="120" y="146" text-anchor="middle" font-size="11" fill="#17233f">Donoghue v Stevenson</text>
  <line x1="52" y1="162" x2="188" y2="162" stroke="#e4e9f5"/>
  <line x1="52" y1="178" x2="188" y2="178" stroke="#e4e9f5"/>
  <line x1="52" y1="194" x2="170" y2="194" stroke="#e4e9f5"/>
  <line x1="52" y1="210" x2="188" y2="210" stroke="#e4e9f5"/>
  <text x="120" y="228" text-anchor="middle" font-size="10" fill="#9aa3bd">~187 tokens</text>

  <!-- arrow -->
  <text x="250" y="150" text-anchor="middle" font-size="12" fill="#2f56c8" font-weight="700">🗜️ compress</text>
  <path d="M228 165 H288" stroke="#2f56c8" stroke-width="2" marker-end="url(#a)"/>

  <!-- Compressed -->
  <rect x="300" y="115" width="150" height="100" rx="12" fill="#eaf0ff" stroke="#c7d6ff"/>
  <text x="375" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#2f56c8">COMPRESSED</text>
  <line x1="322" y1="158" x2="428" y2="158" stroke="#c7d6ff"/>
  <line x1="322" y1="174" x2="410" y2="174" stroke="#c7d6ff"/>
  <text x="375" y="200" text-anchor="middle" font-size="10" fill="#2f56c8">~86 tokens (−54%)</text>

  <!-- Judge -->
  <path d="M468 165 H528" stroke="#2f56c8" stroke-width="2" marker-end="url(#a)"/>
  <circle cx="590" cy="165" r="52" fill="#f4f6fc" stroke="#2f56c8" stroke-width="2"/>
  <text x="590" y="158" text-anchor="middle" font-size="30">⚖️</text>
  <text x="590" y="192" text-anchor="middle" font-size="11" font-weight="700" fill="#17233f">AI JUDGE</text>

  <!-- Two verdicts -->
  <path d="M645 140 H705" stroke="#10b981" stroke-width="2" marker-end="url(#g)"/>
  <path d="M645 190 H705" stroke="#10b981" stroke-width="2" marker-end="url(#g)"/>
  <rect x="712" y="112" width="220" height="46" rx="10" fill="#ffffff" stroke="#e4e9f5"/>
  <text x="726" y="132" font-size="11" fill="#5c6685">verdict on FULL facts</text>
  <text x="726" y="150" font-size="13" font-weight="700" fill="#10b981">liable</text>
  <rect x="712" y="172" width="220" height="46" rx="10" fill="#ffffff" stroke="#e4e9f5"/>
  <text x="726" y="192" font-size="11" fill="#5c6685">verdict on COMPRESSED facts</text>
  <text x="726" y="210" font-size="13" font-weight="700" fill="#10b981">liable</text>

  <!-- verdict -->
  <rect x="240" y="262" width="480" height="46" rx="10" fill="#e9f9f966" stroke="#10b981"/>
  <text x="480" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#0f9d76">✅ Same verdict → the compression kept what mattered</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#2f56c8"/></marker>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#10b981"/></marker>
  </defs>
</svg>
