<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <rect width="960" height="380" fill="#ffffff"/>
  <rect x="20" y="20" width="920" height="340" rx="14" fill="#f4f6fc" stroke="#e4e9f5"/>

  <!-- head -->
  <text x="44" y="58" font-size="17" font-weight="700" fill="#17233f">Donoghue v Stevenson</text>
  <rect x="770" y="40" width="146" height="26" rx="13" fill="#e7f8ef"/>
  <text x="843" y="58" text-anchor="middle" font-size="12" font-weight="700" fill="#0f9d76">✓ verdict match</text>

  <text x="44" y="84" font-size="12" fill="#5c6685">🗜️ Headroom (smart) · 86 tokens</text>
  <text x="44" y="106" font-size="12" fill="#2f56c8">📎 Source: <tspan text-decoration="underline">Donoghue v Stevenson [1932] UKHL 100 — BAILII</tspan>  ·  United Kingdom · 1932</text>

  <!-- two columns -->
  <rect x="44" y="126" width="424" height="150" rx="10" fill="#ffffff" stroke="#e4e9f5"/>
  <text x="62" y="150" font-size="11" font-weight="700" fill="#5c6685" letter-spacing="0.5">AI JUDGMENT</text>
  <text x="62" y="178" font-size="16" font-weight="700" fill="#17233f">liable</text>
  <text x="62" y="202" font-size="11.5" fill="#404a63">A manufacturer owes the ultimate consumer a duty to</text>
  <text x="62" y="218" font-size="11.5" fill="#404a63">take reasonable care; liability does not depend on a</text>
  <text x="62" y="234" font-size="11.5" fill="#404a63">contract with the buyer.</text>
  <rect x="62" y="248" width="150" height="20" rx="5" fill="#f4f6fc" stroke="#e4e9f5"/>
  <text x="70" y="262" font-size="10.5" fill="#5c6685">negligence · duty of care</text>

  <rect x="492" y="126" width="424" height="150" rx="10" fill="#ffffff" stroke="#e4e9f5"/>
  <text x="510" y="150" font-size="11" font-weight="700" fill="#5c6685" letter-spacing="0.5">HUMAN JUDGMENT (1932, House of Lords)</text>
  <text x="510" y="178" font-size="16" font-weight="700" fill="#17233f">liable</text>
  <text x="510" y="202" font-size="11.5" fill="#404a63">The manufacturer owed a duty of care to the consumer</text>
  <text x="510" y="218" font-size="11.5" fill="#404a63">(the "neighbour principle"); the duty existed</text>
  <text x="510" y="234" font-size="11.5" fill="#404a63">independently of any contract.</text>
  <rect x="510" y="248" width="180" height="20" rx="5" fill="#f4f6fc" stroke="#e4e9f5"/>
  <text x="518" y="262" font-size="10.5" fill="#5c6685">neighbour principle</text>

  <!-- score pills -->
  <g font-size="11.5" font-weight="600">
    <rect x="44" y="296" width="120" height="26" rx="7" fill="#ffffff" stroke="#9fe3c2"/><text x="104" y="313" text-anchor="middle" fill="#0f9d76">Reasoning: 71%</text>
    <rect x="176" y="296" width="120" height="26" rx="7" fill="#ffffff" stroke="#9fe3c2"/><text x="236" y="313" text-anchor="middle" fill="#0f9d76">Citation: 100%</text>
    <rect x="308" y="296" width="150" height="26" rx="7" fill="#ffffff" stroke="#9fe3c2"/><text x="383" y="313" text-anchor="middle" fill="#0f9d76">Hallucination: 0%</text>
    <rect x="470" y="296" width="120" height="26" rx="7" fill="#ffffff" stroke="#9fe3c2"/><text x="530" y="313" text-anchor="middle" fill="#0f9d76">Overall: 82%</text>
  </g>
</svg>
